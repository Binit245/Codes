<body>
    <h1>INPUTS</h1>


    <label for="naam">Name:</label>
    <input autofocus="text" id="naam" placeholder="Enter your name">
    <br>

    <label for="pass">Password:</label>
    <input type="password" id="pass" placeholder="Enter your password">
    <br>

    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Enter your email">
    <br>

    <label for="din">Date:</label>
    <input type="date" id="din" placeholder="Enter date">
    <br>

    <label for="rang">Color:</label>
    <input type="color" id="rang" placeholder="Choose a color">
    <br>

    <label for="samay">Time:</label>
    <input type="time" id="samay" placeholder="Enter time">
    <br>

    <label for="no">Number:</label>
    <input type="number"min="10"max="100" id="no" placeholder="Enter a number">
    <br>

    <label for="doori">Range:</label>
    <input type="range" id="doori" min="0" max="100">
    <br>

    <label for="file">File:</label>
    <input type="file" id="file" placeholder="Choose a file">
    <br>

    <label for="line">Telephone:</label>
    <input type="tel" maxlength="10" id="line" placeholder="Enter your telephone number">
    <br>

    <label for="tick">Checkbox:</label>
    <input disabled type="checkbox" id="tick" placeholder="Check me">
    <br>
<fieldset>
    <legend>Personal Bio-Data:</legend>
    gender:
    <br><br>
    <label for="radio">Male:</label>
    <input type="radio" name="gender" id="radio" placeholder="Select me">
    <br>

    <label for="radio">female:</label>
    <input type="radio" name="gender" id="radio" placeholder="Select me">
    <br>

    <label for="radio">other:</label>
    <input type="radio" name="gender" id="radio" placeholder="Select me">
    <br>

    <br>
textarea:
<br>
    <textarea cols="100" rows="2"></textarea>

    <br><br>
    select your bday month:
    <select>
        <option>Jan</option>
        <option>Feb</option>
        <option>March</option>
        <option>April</option>
        <option>May</option>
        <option>June</option>
        <option>July</option>
        <option>August</option>
        <option>September</option>
        <option>October</option>
        <option>November</option>
        <option>December</option>
    </select>
</fieldset>

    <button type="reset">Reset</button>
    <button disabled>Disabled</button>
